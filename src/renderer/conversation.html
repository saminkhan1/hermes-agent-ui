<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' agent-ui-pet: agent-ui-attachment: data: blob: http: https:; media-src 'self' agent-ui-attachment: data: blob: http: https:; connect-src 'self' ws://localhost:* http://localhost:*; object-src 'none';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversation</title>
    <link rel="stylesheet" href="/src/conversation.css" />
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <p class="meta" id="meta" hidden></p>
        <div class="header-actions">
          <span id="typing-status" class="status-pill" hidden></span>
          <button type="button" id="btn-cancel" class="header-btn cancel-btn">Cancel</button>
          <button type="button" id="btn-dismiss" class="header-btn dismiss-btn">Dismiss</button>
          <button type="button" id="btn-close" class="close-btn" aria-label="Close">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
      </div>
      <div class="main-stage" id="main-stage">
        <div id="conversation-section" class="conversation-section">
          <div id="log" class="log" role="log" aria-live="polite" aria-relevant="additions"></div>
        </div>
      </div>
      <footer class="composer">
        <div class="composer-label-row">
          <label class="composer-label" for="followup-input">Follow up</label>
          <span id="composer-error" class="composer-error" role="alert" hidden></span>
        </div>
        <div class="composer-row">
          <textarea
            id="followup-input"
            class="composer-input"
            rows="2"
            placeholder="Message agent… (Enter send · ⌘/Ctrl+Enter or Shift+Enter newline)"
            autocomplete="off"
          ></textarea>
          <button type="button" id="btn-send" class="composer-send">Send</button>
        </div>
      </footer>
    </div>
    <script type="module" src="/src/conversation.js"></script>
  </body>
</html>
