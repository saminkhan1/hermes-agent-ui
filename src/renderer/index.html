<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' ws: http://localhost:*; script-src 'self' 'unsafe-inline' http://localhost:*; style-src 'self' 'unsafe-inline'; img-src 'self' file: data: blob:; connect-src 'self' ws: http://localhost:*;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agent-UI</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="pet-root" hidden>
      <section class="pet-shell" id="pet-shell" aria-label="agent-UI pets">
        <div class="pet-stage">
          <button id="pet-mascot" class="pet-mascot" type="button" aria-label="Open top pet conversation">
            <span class="pet-mascot-sprite" id="pet-mascot-sprite" aria-hidden="true"></span>
            <span class="pet-badge" id="pet-badge" aria-hidden="true">0</span>
          </button>
          <div class="pet-stage-copy">
            <div class="pet-title-row">
              <span class="pet-title">Pets</span>
              <span class="pet-status" id="pet-status">Idle</span>
            </div>
            <div class="pet-subtitle" id="pet-subtitle">Cmd+Shift+C to start a pet.</div>
          </div>
        </div>

        <div class="pet-tray" id="pet-tray" aria-label="Active pets">
          <div class="pet-tray-list" id="pet-tray-list"></div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/renderer.js"></script>
  </body>
</html>
