<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' agent-ui-pet: data: blob:; connect-src 'self' ws://localhost:* http://localhost:*;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>agent-UI</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="pet-root" hidden>
      <section class="pet-shell" id="pet-shell" aria-label="agent-UI pets" data-avatar-overlay-content-frame="true">
        <div class="pet-stage">
          <div id="pet-mascot" class="pet-mascot" aria-label="agent-UI pet"></div>
          <button id="pet-badge" class="pet-badge" type="button" aria-label="Toggle pet activity tray">0</button>
        </div>

        <div class="pet-tray" id="pet-tray" aria-label="Active pets">
          <div class="pet-tray-list" id="pet-tray-list" role="list" aria-label="Activity notifications"></div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
