name: mac bootstrap release gate

on:
  workflow_dispatch:
  push:
    branches:
      - deployment
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  mac-release:
    name: build bootstrap macOS artifacts
    runs-on: macos-15
    timeout-minutes: 90
    env:
      HERMES_RELEASE_TAG: v2026.4.30
      HERMES_RELEASE_REPO: https://github.com/NousResearch/hermes-agent.git
      RELEASE_VERIFY_MODE: bootstrap

    steps:
      - name: Check out agent-UI
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install uv for build-time dependency resolution
        run: brew install uv

      - name: Check out pinned Hermes release
        run: git clone --depth 1 --branch "$HERMES_RELEASE_TAG" "$HERMES_RELEASE_REPO" "$RUNNER_TEMP/hermes-agent"

      - name: Ring 0 fast checks
        run: npm run verify

      - name: Ring 1 package bootstrap DMG and zip
        env:
          HERMES_BUNDLE_SOURCE: ${{ runner.temp }}/hermes-agent
        run: npm run dist:mac

      - name: Record and verify bootstrap artifacts
        run: npm run release:verify

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-ui-mac-bootstrap-${{ github.ref_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/release-manifest.json
          if-no-files-found: error
