name: mac connector bootstrap release gate

on:
  workflow_dispatch:
  push:
    branches:
      - deployment
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  mac-release:
    name: build connector bootstrap macOS artifacts
    runs-on: macos-15
    timeout-minutes: 60
    env:
      RELEASE_VERIFY_SIGNING_MODE: bootstrap
      RELEASE_VERIFY_APP_MODE: connector

    steps:
      - name: Check out agent-UI
        uses: actions/checkout@v4

      - name: Check out Hermes Agent contracts
        run: |
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git "$RUNNER_TEMP/hermes-agent"
          echo "HERMES_AGENT_ROOT=$RUNNER_TEMP/hermes-agent" >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.3

      - name: Restore Electron builder caches
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: ${{ runner.os }}-${{ runner.arch }}-electron-builder-${{ hashFiles('pnpm-lock.yaml', 'packaging/*.cjs') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-electron-builder-

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Ring 0 source checks
        run: |
          pnpm run verify:hermes-contracts
          pnpm run typecheck
          pnpm run format:check
          pnpm run lint

      - name: Ring 1 package connector bootstrap DMG and zip
        run: pnpm run dist:mac

      - name: Record and verify bootstrap artifacts
        run: pnpm run release:verify

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agent-ui-mac-bootstrap-${{ github.ref_name }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/release-manifest.json
          if-no-files-found: error
